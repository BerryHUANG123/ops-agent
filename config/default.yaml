server:
  name: "j1900-server"
  check_interval: 60  # 秒

collectors:
  cpu_threshold: 85
  memory_threshold: 90
  disk_threshold: 85
  load_multiplier: 2.0  # load_per_cpu 超过此倍数告警

services:
  watch:
    - name: sshd
      process: sshd
    - name: docker
      process: dockerd

# Docker 容器监控
docker:
  skip_stopped: true       # 跳过已停止的容器，只监控运行中的
  ignore_containers:       # 忽略的容器名（正则或精确匹配）
    - hello-world

logs:
  paths:
    - /var/log/syslog
    - /var/log/auth.log
  error_patterns:
    - "error"
    - "critical"
    - "fatal"
    - "oom"
    - "killed"
    - "segfault"
  max_lines_per_check: 1000
  # 忽略包含这些关键词的日志行（减少噪音）
  ignore_patterns:
    - "node["       # OpenClaw/node 进程日志
    - "ignoring stale"
    - "a password is required"  # sudo 自身产生的 auth 日志
    - "conversation failed"
    - "auth could not identify password"

remediation:
  enabled: true
  allowed_actions:
    - restart_service
    - clear_logs
    - kill_process
  max_log_size_mb: 500
  log_cleanup_paths:
    - /var/log/*.log.1
    - /tmp/ops-agent-*

report:
  output_dir: /home/huangjinyang/.openclaw/workspace/ops-agent/reports
  format: html
  keep_days: 30
  schedule: ""        # 每日定时生成，格式 "HH:MM"，如 "08:00"，留空则按 interval
  interval_minutes: 1440  # 间隔生成（默认每天一次）

memory:
  db_path: /home/huangjinyang/.openclaw/workspace/ops-agent/data/ops_agent.db
  max_records: 10000

# ===== 告警通知 =====
notifier:
  enabled: false  # 启用后填写 webhook_url
  feishu:
    webhook_url: ""  # 飞书自定义机器人 Webhook URL
    secret: ""  # 签名密钥（可选）
  # 告警合并：短时间内多个告警合并为一条消息
  alert_merge:
    enabled: true
    window_seconds: 60  # 合并时间窗口

  # 邮件通知（备用通道）
  email:
    enabled: false
    smtp_host: "smtp.qq.com"
    smtp_port: 465
    username: ""
    password: ""         # 授权码
    from_addr: ""
    to_addrs: []
    use_tls: false

# ===== LLM 智能分析 =====
llm:
  enabled: false
  api_key: ""         # 或设置环境变量 OPENAI_API_KEY
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o-mini"
  timeout: 30
  max_tokens: 1000

# ===== 告警静默规则 =====
silence:
  enabled: true
  rules:
    # 深夜静默：23:00-07:00 只推送 CRITICAL，不推送 WARNING
    - name: "夜间静默"
      start_hour: 23
      end_hour: 7
      min_severity: "critical"   # 低于此级别的告警不推送
    # 日志错误静默：已知无害的日志错误不告警
    - name: "已知噪音过滤"
      issue_type: "log_error"
      title_contains: ["cloudflared", "WRN"]
      action: "suppress"         # suppress = 完全抑制，不记录
