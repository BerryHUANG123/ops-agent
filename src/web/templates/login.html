<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - OpsAgent</title>
    <link rel="stylesheet" href="/static/themes.css">
    <script>(function(){var t=localStorage.getItem('opsagent-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 40px; width: 360px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        .login-box h1 { text-align: center; margin-bottom: 8px; font-size: 24px; }
        .login-box h1 span { color: var(--accent); }
        .login-box .subtitle { text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 32px; }
        .login-box input {
            width: 100%; padding: 10px 14px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--input-bg);
            color: var(--text-primary); font-size: 14px; margin-bottom: 12px;
            outline: none; transition: border 0.2s;
        }
        .login-box input:focus { border-color: var(--accent); }
        .login-box button {
            width: 100%; padding: 10px; border-radius: 8px; border: none;
            background: var(--accent); color: #fff; font-size: 14px;
            font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .login-box button:hover { background: var(--accent-hover); }
        .error { color: var(--danger); font-size: 13px; text-align: center; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔍 <span>Ops</span>Agent</h1>
        <div class="subtitle">运维监控管理平台</div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="用户名" autofocus required>
            <input type="password" name="password" placeholder="密码" required>
            <button type="submit">登 录</button>
        </form>
    </div>
</body>
</html>
