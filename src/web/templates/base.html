<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OpsAgent{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #0f1117; color: #e0e0e0; line-height: 1.6;
        }
        /* 侧边栏 */
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 220px;
            background: #161822; border-right: 1px solid #2a2d3a;
            padding: 20px 0; z-index: 100;
        }
        .sidebar .logo {
            padding: 0 20px 20px; border-bottom: 1px solid #2a2d3a;
            font-size: 18px; font-weight: 700; color: #fff;
        }
        .sidebar .logo span { color: #6c63ff; }
        .sidebar nav { padding: 16px 0; }
        .sidebar nav a {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 20px; color: #8b8fa3; text-decoration: none;
            font-size: 14px; transition: all 0.2s;
        }
        .sidebar nav a:hover, .sidebar nav a.active {
            color: #fff; background: #1e2030;
            border-right: 3px solid #6c63ff;
        }
        .sidebar nav a .icon { font-size: 18px; width: 24px; text-align: center; }
        .sidebar .server-info {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            padding: 12px; background: #1e2030; border-radius: 8px;
            font-size: 12px; color: #6b7280;
        }
        .sidebar .server-info .name { color: #6c63ff; font-weight: 600; }

        /* 主内容 */
        .main { margin-left: 220px; padding: 24px; min-height: 100vh; }
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px;
        }
        .page-header h1 { font-size: 22px; color: #fff; }
        .page-header .time { font-size: 13px; color: #6b7280; }

        /* 卡片 */
        .card {
            background: #161822; border: 1px solid #2a2d3a;
            border-radius: 12px; padding: 20px; margin-bottom: 16px;
        }
        .card h2 {
            font-size: 15px; color: #8b8fa3; margin-bottom: 16px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* 指标网格 */
        .metrics-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 24px;
        }
        .metric-card {
            background: #161822; border: 1px solid #2a2d3a;
            border-radius: 12px; padding: 20px;
        }
        .metric-card .label { font-size: 12px; color: #6b7280; margin-bottom: 8px; text-transform: uppercase; }
        .metric-card .value { font-size: 28px; font-weight: 700; }
        .metric-card .sub { font-size: 12px; color: #6b7280; margin-top: 4px; }
        .metric-card .bar {
            height: 4px; background: #2a2d3a; border-radius: 2px; margin-top: 12px;
            overflow: hidden;
        }
        .metric-card .bar-fill {
            height: 100%; border-radius: 2px; transition: width 0.5s;
        }

        /* 颜色 */
        .color-normal { color: #10b981; }
        .color-warning { color: #f59e0b; }
        .color-critical { color: #ef4444; }
        .bg-normal { background: #10b981; }
        .bg-warning { background: #f59e0b; }
        .bg-critical { background: #ef4444; }

        /* 表格 */
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 10px 14px; text-align: left; border-bottom: 1px solid #2a2d3a;
            font-size: 13px;
        }
        th { color: #6b7280; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        tr:hover { background: #1e2030; }

        /* 标签 */
        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 600;
        }
        .badge-critical { background: rgba(239,68,68,0.15); color: #ef4444; }
        .badge-warning { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .badge-info { background: rgba(99,102,241,0.15); color: #6c63ff; }
        .badge-success { background: rgba(16,185,129,0.15); color: #10b981; }
        .badge-running { background: rgba(16,185,129,0.15); color: #10b981; }
        .badge-stopped { background: rgba(239,68,68,0.15); color: #ef4444; }

        /* 状态指示 */
        .status-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 6px;
        }
        .status-dot.on { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.5); }
        .status-dot.off { background: #ef4444; }

        /* 分页 */
        .pagination {
            display: flex; gap: 8px; justify-content: center; margin-top: 20px;
        }
        .pagination a, .pagination span {
            padding: 6px 12px; border-radius: 6px; font-size: 13px;
            text-decoration: none; color: #8b8fa3; background: #1e2030;
        }
        .pagination a:hover { background: #2a2d3a; color: #fff; }
        .pagination .current { background: #6c63ff; color: #fff; }

        /* 报告列表 */
        .report-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; border-bottom: 1px solid #2a2d3a;
        }
        .report-item:hover { background: #1e2030; }
        .report-item a { color: #6c63ff; text-decoration: none; font-weight: 500; }
        .report-item a:hover { text-decoration: underline; }
        .report-item .meta { font-size: 12px; color: #6b7280; }

        /* 配置展示 */
        .config-block {
            background: #1e2030; border-radius: 8px; padding: 16px;
            font-family: "JetBrains Mono", "Fira Code", monospace;
            font-size: 13px; line-height: 1.8; white-space: pre-wrap;
            color: #a0aec0; overflow-x: auto;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }
        .stat-item {
            text-align: center; padding: 16px; background: #1e2030; border-radius: 8px;
        }
        .stat-item .num { font-size: 24px; font-weight: 700; color: #fff; }
        .stat-item .desc { font-size: 11px; color: #6b7280; margin-top: 4px; }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🔍 <span>Ops</span>Agent</div>
        <nav>
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">
                <span class="icon">📊</span> 仪表盘
            </a>
            <a href="/incidents" class="{% if request.path == '/incidents' %}active{% endif %}">
                <span class="icon">🚨</span> 告警记录
            </a>
            <a href="/reports" class="{% if request.path == '/reports' %}active{% endif %}">
                <span class="icon">📋</span> 巡检报告
            </a>
            <a href="/config" class="{% if request.path == '/config' %}active{% endif %}">
                <span class="icon">⚙️</span> 配置
            </a>
        </nav>
        <div class="server-info">
            <div class="name">{{ server_name }}</div>
            <div>OpsAgent Web UI</div>
        </div>
    </div>

    <div class="main">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
