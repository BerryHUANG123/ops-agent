{% extends "base.html" %}

{% block title %}健康状态 - OpsAgent{% endblock %}

{% block content %}
<div class="page-header">
    <h1>💚 健康状态</h1>
    <div class="time">OpsAgent 自身监控</div>
</div>

<div class="metrics-grid" id="healthGrid">
    <div class="metric-card">
        <div class="label">Agent 进程</div>
        <div class="value color-normal" id="agentStatus">检测中...</div>
        <div class="sub" id="agentSub"></div>
    </div>
    <div class="metric-card">
        <div class="label">Web UI 进程</div>
        <div class="value color-normal" id="webStatus">检测中...</div>
        <div class="sub" id="webSub"></div>
    </div>
    <div class="metric-card">
        <div class="label">Agent 内存</div>
        <div class="value" id="agentMem">-</div>
        <div class="sub">MB</div>
        <div class="bar"><div class="bar-fill bg-normal" id="agentMemBar" style="width:0%"></div></div>
    </div>
    <div class="metric-card">
        <div class="label">Agent CPU</div>
        <div class="value" id="agentCpu">-</div>
        <div class="sub">%</div>
        <div class="bar"><div class="bar-fill bg-normal" id="agentCpuBar" style="width:0%"></div></div>
    </div>
</div>

<div class="card">
    <h2>🖥️ 系统资源</h2>
    <div class="metrics-grid" style="margin-bottom: 0;">
        <div class="metric-card">
            <div class="label">CPU</div>
            <div class="value" id="sysCpu">-</div>
            <div class="sub">%</div>
        </div>
        <div class="metric-card">
            <div class="label">内存</div>
            <div class="value" id="sysMem">-</div>
            <div class="sub">%</div>
        </div>
        <div class="metric-card">
            <div class="label">磁盘</div>
            <div class="value" id="sysDisk">-</div>
            <div class="sub">%</div>
        </div>
    </div>
</div>

<div class="card">
    <h2>🌐 监听端口</h2>
    <div id="portsList" style="color: var(--text-muted); font-size: 13px;">加载中...</div>
</div>

<div class="card">
    <h2>🔗 活跃连接 (Top 20)</h2>
    <div id="connsList" style="color: var(--text-muted); font-size: 13px;">加载中...</div>
</div>

<script>
async function loadHealth() {
    try {
        const res = await fetch('/api/health');
        const data = await res.json();

        // Agent
        const a = data.agent;
        document.getElementById('agentStatus').textContent = a.running ? '✅ 运行中' : '❌ 未运行';
        document.getElementById('agentStatus').className = 'value ' + (a.running ? 'color-normal' : 'color-critical');
        document.getElementById('agentSub').textContent = a.running ? `PID ${a.pid} · 运行 ${Math.floor(a.uptime_seconds/3600)}h` : '';

        // Web
        const w = data.web;
        document.getElementById('webStatus').textContent = w.running ? '✅ 运行中' : '❌ 未运行';
        document.getElementById('webStatus').className = 'value ' + (w.running ? 'color-normal' : 'color-critical');
        document.getElementById('webSub').textContent = w.running ? `PID ${w.pid}` : '';

        // Agent metrics
        if (a.memory_mb) {
            const mem = a.memory_mb;
            document.getElementById('agentMem').textContent = mem;
            const pct = Math.min(mem / 256 * 100, 100);
            document.getElementById('agentMemBar').style.width = pct + '%';
            document.getElementById('agentMemBar').className = 'bar-fill ' + (pct > 80 ? 'bg-critical' : pct > 50 ? 'bg-warning' : 'bg-normal');
        }
        if (a.cpu_percent !== undefined) {
            document.getElementById('agentCpu').textContent = a.cpu_percent;
            document.getElementById('agentCpuBar').style.width = Math.min(a.cpu_percent, 100) + '%';
            document.getElementById('agentCpuBar').className = 'bar-fill ' + (a.cpu_percent > 80 ? 'bg-critical' : a.cpu_percent > 50 ? 'bg-warning' : 'bg-normal');
        }

        // System
        document.getElementById('sysCpu').textContent = data.system.cpu_percent;
        document.getElementById('sysMem').textContent = data.system.memory_percent;
        document.getElementById('sysDisk').textContent = data.system.disk_percent;
    } catch (e) {
        document.getElementById('agentStatus').textContent = '⚠️ 检测失败';
    }
}
loadHealth();
setInterval(loadHealth, 15000);

// 网络监控
async function loadNetwork() {
    try {
        const res = await fetch('/api/network');
        const data = await res.json();

        // 监听端口
        let portsHtml = '<table style="width:100%"><thead><tr><th>端口</th><th>协议</th><th>进程</th><th>地址</th></tr></thead><tbody>';
        data.listening.forEach(p => {
            portsHtml += `<tr><td style="color:var(--accent);font-weight:600">${p.port}</td><td>${p.protocol}</td><td>${p.process}</td><td style="font-family:monospace;font-size:12px">${p.address}</td></tr>`;
        });
        portsHtml += '</tbody></table>';
        document.getElementById('portsList').innerHTML = portsHtml;

        // 活跃连接
        let connsHtml = '<table style="width:100%"><thead><tr><th>本地</th><th>远程</th><th>状态</th><th>进程</th></tr></thead><tbody>';
        data.connections.slice(0, 20).forEach(c => {
            connsHtml += `<tr><td style="font-family:monospace;font-size:12px">${c.local}</td><td style="font-family:monospace;font-size:12px">${c.remote}</td><td><span class="badge badge-success">${c.status}</span></td><td>${c.process}</td></tr>`;
        });
        connsHtml += '</tbody></table>';
        document.getElementById('connsList').innerHTML = connsHtml;
    } catch (e) {
        document.getElementById('portsList').innerHTML = '加载失败';
    }
}
loadNetwork();
</script>
{% endblock %}
